<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymTracker</title>
    <link rel ="stylesheet" href="/client/css/reset.css">
    <link rel="stylesheet" href="/client/css/variables.css">
    <link rel="stylesheet" href="/client/css/main.css">
    <link rel="stylesheet" href="/client/css/pages/auth.css">
</head>

<body>
    <div id="auth-container">
        <form id="login-form" class="card">
            <h1>Iniciar sesión</h1>
            <p>Inicia sesión para continuar</p>

            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-input" id="email" name="email" placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-input" id="password" name="password" placeholder="Tu contraseña">
            </div>

            <button type="submit" class="btn btn--primary btn--full">Iniciar sesión</button>
            <p id="a-registro">¿No tienes cuenta? <a href="#" class="text-accent">Regístrate</a></p>
        </form>

        <form id="register-form" class="card" style="display: none;">
            <h1>Registrarse</h1>
            <p>Empieza a trackear tu progreso</p>

            <div class="form-group">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" class="form-input" id="nombre" name="nombre" placeholder="Tu nombre">
            </div>
            <div class="form-group">
                <label for="register-email" class="form-label">Email</label>
                <input type="email" class="form-input" id="register-email" name="email" placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label for="register-password" class="form-label">Contraseña</label>
                <input type="password" class="form-input" id="register-password" name="password" placeholder="Tu contraseña">
            </div>
            <div class="form-group">
                <label for="confirm-password" class="form-label">Confirmar contraseña</label>
                <input type="password" class="form-input" id="confirm-password" name="confirm-password" placeholder="Confirma tu contraseña">
            </div>

            <button type="submit" class="btn btn--primary btn--full">Registrarse</button>
            <p id="a-inicio">¿Ya tienes cuenta? <a href="#" class="text-accent">Inicia sesión</a></p>
        </form>
    </div>
    <script src="../js/pages/auth.js"></script>
</body>
</html>
