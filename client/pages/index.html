<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymTracker</title>
    <link rel ="stylesheet" href="/client/css/reset.css">
    <link rel="stylesheet" href="/client/css/variables.css">
    <link rel="stylesheet" href="/client/css/main.css">
</head>

<body>
    <div id="auth-container">
        <form id="login-form">
            <h1>Iniciar sesión</h1>
            <p>Inicia sesión para continuar</p>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="tu@email.com">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required placeholder="Tu contraseña">
            <button type="submit">Iniciar sesión</button>
            <p id="a-registro">¿No tienes cuenta? <a href="#">Regístrate</a></p>
        </form>

        <form id="register-form" style="display: none;">
            <h1>Registrarse</h1>
            <h2>Empieza a trackear tu progreso</h2>
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre">
            <label for="register-email">Email</label>
            <input type="email" id="register-email" name="email" required placeholder="tu@email.com">
            <label for="register-password">Contraseña</label>
            <input type="password" id="register-password" name="password" required placeholder="Tu contraseña">
            <label for="confirm-password">Confirmar contraseña</label>
            <input type="password" id="confirm-password" name="confirm-password" required placeholder="Confirma tu contraseña">
            <button type="submit">Registrarse</button>
            <p id="a-inicio">¿Ya tienes cuenta? <a href="#">Inicia sesión</a></p>
        </form>
    </div>
</body>
</html>
